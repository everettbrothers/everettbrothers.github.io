  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white:   #F7F7F5;
      --ink:     #111110;
      --nav-h:   60px;
      --display: 'Archivo', sans-serif;
      --body:    'Libre Franklin', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--ink);
      color: var(--white);
      font-family: var(--body);
      font-weight: 300;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── VIDEO ──
       Mobile / narrow: the video fills or centers behind the text (original behavior).
       Desktop (≥900px): the video becomes a framed 9:16 column on the RIGHT,
       and all text lives on solid ink to the left — no text ever sits on footage. */
    .video-wrap {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: var(--ink);
    }
    .video-wrap video {
      height: 100%;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      display: block;
    }
    /* On portrait / narrow screens (phones), fill the screen fully. */
    @media (max-aspect-ratio: 9/16) {
      .video-wrap video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    }

    .video-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        to bottom,
        rgba(17,17,16,0.50) 0%,
        rgba(17,17,16,0.08) 30%,
        rgba(17,17,16,0.08) 70%,
        rgba(17,17,16,0.68) 100%
      );
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 10; height: var(--nav-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 44px;
    }
    .nav-name {
      font-family: var(--display);
      font-size: 13px; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--white); text-decoration: none; opacity: 0.92;
    }
    .nav-links { display: flex; gap: 40px; list-style: none; }
    .nav-links a {
      font-family: var(--body);
      font-size: 10px; font-weight: 300;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--white); text-decoration: none;
      opacity: 0.5; transition: opacity 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { opacity: 1; }

    /* ── HERO (mobile-first: centered, anchored to the bottom over the video) ── */
    .hero {
      position: fixed; inset: 0; z-index: 5;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding: 0 24px 40px; text-align: center; pointer-events: none;
    }
    .hero-location {
      font-family: var(--body);
      font-size: 9px; font-weight: 300;
      letter-spacing: 0.38em; text-transform: uppercase;
      color: rgba(247,247,245,0.5); margin-bottom: 18px;
      display: none; /* shown on desktop, hidden on mobile to keep the stack compact */
    }
    .hero-name {
      font-family: var(--display);
      font-size: clamp(34px, 5.5vw, 58px); font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--white); line-height: 1.06; margin-bottom: 16px;
    }
    .hero-rule {
      width: 24px; height: 0.5px; background: rgba(247,247,245,0.35);
      margin: 0 auto 20px;
      display: none; /* shown on desktop */
    }
    .hero-cred {
      font-family: var(--body);
      font-size: 11px; font-weight: 300;
      letter-spacing: 0.08em;
      color: rgba(247,247,245,0.8);
      line-height: 1.75;
      max-width: 340px;
      margin: 0 auto 24px;
    }
    .hero-cred strong { font-weight: 400; color: var(--white); }
    .hero-cta {
      pointer-events: auto;
      display: inline-block;
      font-family: var(--body);
      font-size: 10px; font-weight: 300;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--white); text-decoration: none;
      border: 0.5px solid rgba(247,247,245,0.55);
      padding: 13px 34px 12px 38px;
      transition: background 0.25s ease, color 0.25s ease, border-color 0.25s ease;
    }
    .hero-cta:hover, .hero-cta:focus-visible {
      background: var(--white);
      color: var(--ink);
      border-color: var(--white);
      outline: none;
    }

    /* ── DESKTOP SPLIT (≥900px): text block left on solid ink, video framed right ── */
    @media (min-width: 900px) {
      .video-wrap {
        justify-content: flex-end;
        padding: calc(var(--nav-h) + 24px) 6vw 40px 0;
      }
      .video-wrap video {
        height: 100%;
        max-height: calc(100vh - var(--nav-h) - 64px);
      }
      /* text sits on solid ink — no dimming needed, keep the footage clean */
      .video-overlay { display: none; }

      .hero {
        right: auto;
        width: min(46vw, 620px);
        align-items: flex-start;
        justify-content: center;
        text-align: left;
        padding: var(--nav-h) 0 0 7vw;
      }
      .hero-location { display: block; }
      .hero-name { margin-bottom: 22px; }
      .hero-rule { display: block; margin: 0 0 22px; }
      .hero-cred {
        font-size: 13px;
        max-width: 380px;
        margin: 0 0 32px;
      }
    }

    /* ── MOBILE NAV ── */
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 4px; flex-direction: column; gap: 6px; }
    .hamburger span { display: block; width: 20px; height: 0.5px; background: var(--white); opacity: 0.75; }
    .mobile-menu {
      display: none; position: fixed; inset: 0; z-index: 20;
      background: rgba(17,17,16,0.97);
      flex-direction: column; align-items: center; justify-content: center; gap: 44px;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-family: var(--display);
      font-size: 13px; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--white); text-decoration: none; opacity: 0.8;
    }
    .mobile-close { position: absolute; top: 18px; right: 40px; background: none; border: none; color: var(--white); font-size: 22px; cursor: pointer; opacity: 0.4; font-family: var(--body); font-weight: 300; }

    @media (max-width: 600px) {
      nav { padding: 0 24px; }
      .nav-links { display: none; }
      .hamburger { display: flex; }
    }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    /* Name arrives: eases open in letter-spacing and scale, settling into place */
    @keyframes nameExpand {
      from { opacity: 0; letter-spacing: -0.02em; transform: scale(0.94); }
      to   { opacity: 1; letter-spacing: 0.06em;  transform: scale(1); }
    }
    nav   { animation: fadeUp 1s ease 0.2s both; }
    .hero { animation: fadeUp 1.1s ease 0.5s both; }
    .hero-name { animation: nameExpand 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.7s both; }
    .hero-cred { animation: fadeUp 1s ease 1.1s both; }
    .hero-cta  { animation: fadeUp 1s ease 1.3s both; }

    @media (prefers-reduced-motion: reduce) {
      nav, .hero, .hero-name, .hero-cred, .hero-cta { animation: none; }
    }
  </style>
